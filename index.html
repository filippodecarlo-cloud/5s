<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root{--blue:#1b4fa0;--bg:#f4f6f9;--ink:#1e2a38;--ok:#1e9e58;--bad:#d04040;--wood:#d4a373}
*{box-sizing:border-box}
body{margin:0;font-family:Georgia,'Times New Roman',serif;background:var(--bg);color:var(--ink)}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#fff;border-bottom:3px solid var(--blue);flex-wrap:wrap;gap:8px}
h1{font-size:20px;color:var(--blue);margin:0}
.hbtns{display:flex;gap:6px;align-items:center}
.langbtn{border:1px solid var(--blue);background:#fff;color:var(--blue);padding:4px 10px;cursor:pointer;font-weight:bold;border-radius:4px;font-family:inherit}
.langbtn.active{background:var(--blue);color:#fff}
main{max-width:1000px;margin:0 auto;padding:16px}
.card{background:#fff;border:1px solid #d8dee8;border-radius:10px;padding:20px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card h2{color:var(--blue);margin-top:0;font-size:22px}
.btn{background:var(--blue);color:#fff;border:none;padding:10px 24px;font-size:16px;border-radius:6px;cursor:pointer;font-family:inherit}
.btn.sec{background:#fff;color:var(--blue);border:1px solid var(--blue)}
.btn:hover{opacity:.9}
.gamegrid{display:flex;gap:14px;flex-wrap:wrap}
.gamecard{flex:1;min-width:240px;cursor:pointer;transition:transform .15s}
.gamecard:hover{transform:translateY(-3px)}
.gamecard .big{font-size:42px}
.field{position:relative;background:#fff;border:3px solid var(--ink);border-radius:8px;height:440px;overflow:hidden;user-select:none;touch-action:manipulation}
.num{position:absolute;cursor:pointer;line-height:1;padding:2px;transition:opacity .2s}
.num.found{color:var(--ok)!important;opacity:.25;pointer-events:none;text-decoration:line-through}
.num.bad,.itm.bad{color:var(--bad)!important;text-shadow:0 0 6px var(--bad)}
.zline{position:absolute;background:#aab4c2}
.zlabel{position:absolute;font-size:10px;color:#93a0af;font-family:sans-serif;pointer-events:none}
.topbar{display:flex;justify-content:space-between;align-items:center;margin:8px 0;gap:12px;flex-wrap:wrap}
.target{font-size:18px;font-weight:bold}
.timerwrap{flex:1;min-width:140px;height:14px;background:#dde3ec;border-radius:7px;overflow:hidden}
.timerbar{height:100%;background:var(--blue);width:100%}
.timerbar.low{background:var(--bad)}
.timerbar.up{background:var(--ok)}
.tsec{font-family:sans-serif;font-weight:bold;min-width:52px;text-align:right}
.lesson{background:#eef3fb;border-left:4px solid var(--blue);padding:12px 14px;border-radius:0 6px 6px 0;margin-top:12px}
.bigscore{font-size:44px;color:var(--blue);font-weight:bold;margin:6px 0}
.bars .row{display:flex;align-items:center;gap:10px;margin:7px 0}
.bars .lbl{width:200px;font-size:14px;text-align:right}
.bars .track{flex:1;background:#e6eaf1;border-radius:5px;height:24px;position:relative}
.bars .fill{height:100%;background:var(--blue);border-radius:5px;display:flex;align-items:center;justify-content:flex-end;color:#fff;font-family:sans-serif;font-size:13px;padding-right:6px;min-width:34px}
.playwrap{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap}
.playwrap .field{flex:1;min-width:300px}
aside.check{width:210px;background:#fff;border:1px solid #d8dee8;border-radius:8px;padding:10px;font-size:14px}
aside.check h3{margin:0 0 8px;font-size:15px;color:var(--blue)}
.crow{display:flex;align-items:center;gap:8px;padding:3px 0;border-bottom:1px dashed #e4e8ef}
.crow .cem{font-size:20px}
.crow .cnt{margin-left:auto;font-family:sans-serif;font-weight:bold}
.crow.done .cnt{color:var(--ok)}
.occnote{margin-top:10px;font-size:12px;color:#5d6a7a;background:#f6f3e7;padding:8px;border-radius:6px}
.drawers{display:flex;gap:12px;flex:1;min-width:300px}
.drawer{position:relative;flex:1;background:#fff;border:3px solid var(--ink);border-radius:8px;height:460px;overflow:hidden;user-select:none}
.itm{position:absolute;cursor:pointer;line-height:1}
.itm.found{opacity:.22;pointer-events:none}
.itm .chk{position:absolute;top:-8px;right:-8px;font-size:16px}
table.deb{border-collapse:collapse;width:100%;font-size:14px}
table.deb td,table.deb th{border:1px solid #d8dee8;padding:7px 9px;text-align:left;vertical-align:top}
table.deb th{background:#eef3fb;color:var(--blue)}
.muted{color:#5d6a7a;font-size:14px}
.modegrid{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px}
.modecard{flex:1;min-width:230px;border:2px solid #d8dee8;border-radius:10px;padding:16px;cursor:pointer;transition:border-color .15s,transform .15s;background:#fff}
.modecard:hover{border-color:var(--blue);transform:translateY(-2px)}
.modecard .mi{font-size:34px}
.modecard h3{color:var(--blue);margin:6px 0}
/* Officina (gioco 3) */
#wb .surface{position:relative;width:100%;max-width:760px;height:420px;margin:0 auto;background:var(--wood);border:12px solid #6b4f3a;border-radius:12px;overflow:hidden;background-image:repeating-linear-gradient(90deg,transparent 0,transparent 78px,rgba(0,0,0,.05) 78px,rgba(0,0,0,.05) 80px);user-select:none;touch-action:manipulation}
#wb .obj{position:absolute;font-size:34px;line-height:1;cursor:pointer;transform:translate(-50%,-50%);transition:opacity .2s;filter:drop-shadow(1px 2px 2px rgba(0,0,0,.3))}
#wb .obj.gone{opacity:0;pointer-events:none}
#wb .obj.anom{outline:3px solid var(--ok);outline-offset:2px;border-radius:6px}
#wb .slot{position:absolute;font-size:34px;line-height:1;transform:translate(-50%,-50%);opacity:.22;filter:grayscale(1)}
#wb .slot.filled{opacity:0}
#wb .slot.anom{opacity:.5;outline:3px solid var(--ok);outline-offset:2px;border-radius:6px}
#wb .stain{position:absolute;width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,#3a2e22 0%,rgba(58,46,34,.85) 55%,transparent 100%);transform:translate(-50%,-50%);cursor:pointer;z-index:30}
#wb .defect{position:absolute;font-size:30px;transform:translate(-50%,-50%);z-index:40;cursor:pointer;animation:wbp 1s infinite}
@keyframes wbp{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.2)}}
#wb .lblcard{width:150px;border:2px solid #d8dee8;border-radius:8px;padding:12px;cursor:pointer;text-align:center;background:#fff;transition:border-color .15s,transform .1s}
#wb .lblcard:hover{border-color:var(--blue);transform:translateY(-2px)}
@media(max-width:700px){.bars .lbl{width:110px;font-size:12px}aside.check{width:100%}}
</style>
</head>

  <h1 id="htitle">Serious Games 5S</h1>
  <div class="hbtns">

</header>

function buildDecayPlan(){
 const order=shuffle(Array.from({length:49},(_,k)=>k));
 const gridPos=[],messyPos=[];
 for(let k=0;k<49;k++){const cc=k%10,rr=Math.floor(k/10);
  gridPos[k]={x:(cc+0.5)/10*100,y:(rr+0.5)/5*100};
  messyPos[k]={x:cl(rnd(5,95),4,96),y:cl(rnd(6,94),5,94),rot:(Math.random()<0.12?180:rnd(-95,95)),size:Math.round(rnd(13,38)),bold:Math.random()<0.18,ital:Math.random()<0.15};}
 NG.decayPlan={order,gridPos,messyPos};
}

function renderDecayField(fld,driftN,interactive){
 if(!NG.decayPlan)buildDecayPlan();

function playNumRound(){
 const i=NG.round,cfg=NCFG[i],r=t('nr')[i];
 NG.seekLo=cfg.seekLo;NG.seekEnd=cfg.seekLo+N_COUNT-1;NG.next=cfg.seekLo;NG.timeLeft=N_LIMIT;NG.t0=Date.now();

 <div class="field" id="fld"></div></div>`;
 const fld=$('#fld');
 const palette=['#1e2a38','#3a6fc4','#2e9e58','#857a2e','#8fb4e8'],grays=['#111','#2b2b2b','#4a4a4a'];
 if(cfg.layout==='zones'){
  for(let k=1;k<3;k++){const v=document.createElement('div');v.className='zline';v.style.cssText=`left:${k*100/3}%;top:0;width:2px;height:100%`;fld.appendChild(v);const h=document.createElement('div');h.className='zline';h.style.cssText=`top:${k*100/3}%;left:0;height:2px;width:100%`;fld.appendChild(h);}
  for(let z=0;z<9;z++){const nums=[];for(let n=z+1;n<=49;n+=9)nums.push(n);const lab=document.createElement('div');lab.className='zlabel';lab.textContent=nums.join(' · ');lab.style.left=((z%3)*100/3+1.2)+'%';lab.style.top=(Math.floor(z/3)*100/3+0.8)+'%';fld.appendChild(lab);}
 }
 if(cfg.layout==='decay'){renderDecayField(fld,NG.driftN,true);}
 else{
  const vals=[];for(let v=cfg.renderLo;v<=cfg.renderHi;v++)vals.push(v);
  let pos={};
  if(cfg.layout==='chaos'){
   const cols=12,rows=8,cells=[];for(let rr=0;rr<rows;rr++)for(let cc=0;cc<cols;cc++)cells.push([cc,rr]);shuffle(cells);
   vals.forEach((v,k)=>{const cc=cells[k][0],rr=cells[k][1];pos[v]={x:cl((cc+0.25+Math.random()*0.5)/cols*100,4,96),y:cl((rr+0.25+Math.random()*0.5)/rows*100,5,94)};});
  }else if(cfg.layout==='zones'){
   const zcells={};for(let z=0;z<9;z++){const c=[];for(let a=0;a<3;a++)for(let b=0;b<2;b++)c.push([a,b]);zcells[z]=shuffle(c);}
   const used={};vals.forEach(v=>{const z=(v-1)%9;used[z]=used[z]||0;const cell=zcells[z][used[z]++];const a=cell[0],b=cell[1];const zx=(z%3)/3*100,zy=Math.floor(z/3)/3*100;pos[v]={x:cl(zx+((a+0.3+Math.random()*0.4)/3)*(100/3),4,96),y:cl(zy+((b+0.45+Math.random()*0.35)/2)*(100/3),5,94)};});
  }else{vals.forEach((v,k)=>{const cc=k%10,rr=Math.floor(k/10);pos[v]={x:(cc+0.5)/10*100,y:(rr+0.5)/5*100};});}
  vals.forEach((v,k)=>{
   const s=document.createElement('span');s.className='num';s.dataset.n=v;s.textContent=v;
   const p=pos[v];s.style.left=p.x+'%';s.style.top=p.y+'%';let tr='translate(-50%,-50%)';
   if(cfg.clean){s.style.fontSize='22px';s.style.color=palette[k%palette.length];}
   else{s.style.fontSize=Math.round(rnd(13,38))+'px';const rot=Math.random()<0.12?180:rnd(-95,95);tr+=` rotate(${rot}deg)`;s.style.color=grays[k%grays.length];if(Math.random()<0.18)s.style.fontWeight='bold';if(Math.random()<0.15)s.style.fontStyle='italic';}
   s.style.transform=tr;s.onclick=numClick;fld.appendChild(s);
  });
 }
 NG.timer=setInterval(()=>{if(NG.mode==='timed'){NG.timeLeft-=0.1;if(NG.timeLeft<=0){NG.timeLeft=0;updNTimer();endNumRound(false);return;}}updNTimer();},100);
 updNTimer();
}
function updNTimer(){const b=$('#tbar'),sx=$('#tsec');if(!b)return;if(NG.mode==='timed'){b.style.width=(NG.timeLeft/N_LIMIT*100)+'%';b.classList.toggle('low',NG.timeLeft<5);sx.textContent=fmtClock(NG.timeLeft);}else{const el=(Date.now()-NG.t0)/1000;b.style.width=Math.min(100,el/60*100)+'%';sx.textContent=fmtClock(el);}}
function numClick(e){const n=+e.target.dataset.n;if(n===NG.next){e.target.classList.add('found');NG.next++;if(NG.next>NG.seekEnd){endNumRound(true);return;}$('#target').textContent=t('find')+' '+NG.next;}else{e.target.classList.add('bad');setTimeout(()=>e.target.classList.remove('bad'),350);}}
function endNumRound(complete){clearInterval(NG.timer);NG.timer=null;const time=(Date.now()-NG.t0)/1000;NG.results.push({score:NG.next-NG.seekLo,reached:NG.next-1,time,complete});go(showNumResult);}
function showNumResult(){

/* ====== TOOLS GAME ====== */
const T_LIMIT=30;
const TOOLDEF={screwdriver:{e:'🪛',req:5},spanner:{e:'🔧',req:5},pen:{e:'🖊️',req:1},goggles:{e:'🥽',req:1},hammer:{e:'🔨',req:1},saw:{e:'🪚',req:1},ruler:{e:'📏',req:1},tongs:{e:'🗜️',req:2}};
const TOOLDEF2={brush:{e:'🖌️',req:3},marker:{e:'🖍️',req:2},bucket:{e:'🪣',req:1},flashlight:{e:'🔦',req:1},gloves:{e:'🧤',req:2},square:{e:'📐',req:1},battery:{e:'🔋',req:2}};
const OCC=['✂️','🔪','🧲','🔩'], OCC2=['🧽','🧴','🧹'];
const JUNK=['🍎','📱','🎧','📄','🔑','⌚','📎','📀','💡','🧢','🍌','☂️'];
const EXTRA={screwdriver:3,spanner:3,hammer:1,ruler:1,tongs:1};
const TYPEHUE={screwdriver:0,spanner:205,pen:65,goggles:295,hammer:140,saw:25,ruler:255,tongs:330,brush:20,marker:280,bucket:190,flashlight:50,gloves:160,square:100,battery:335};
const TSTAGE=[
 {dept:1,junk:true ,extras:true ,look:'random'   ,drawers:2,organized:false},
 {dept:1,junk:false,extras:true ,look:'random'   ,drawers:2,organized:false},
 {dept:1,junk:false,extras:false,look:'random'   ,drawers:2,organized:false},
 {dept:1,junk:false,extras:false,look:'typed'    ,drawers:2,organized:false},
 {dept:1,junk:false,extras:false,look:'organized',drawers:1,organized:true},
 {dept:2,junk:false,extras:false,look:'organized',drawers:1,organized:true}
];
const TG={mode:'timed',stage:0,results:[],counts:{},found:0,errors:0,total:0,timer:null,timeLeft:0,t0:0};
const deptDef=d=>d===2?TOOLDEF2:TOOLDEF;
const deptOcc=d=>d===2?OCC2:OCC;
const deptLabels=d=>d===2?t('tools2'):t('tools');
function deptTotal(d){const def=deptDef(d);let s=0;for(const k in def)s+=def[k].req;return s;}
function startTools(mode){TG.mode=mode;TG.stage=0;TG.results=[];go(showToolIntro,0);}

function buildItems(cfg){
 const def=deptDef(cfg.dept),items=[];
 for(const k in def)for(let i=0;i<def[k].req;i++)items.push({kind:'req',type:k,e:def[k].e,rank:i,count:def[k].req});
 deptOcc(cfg.dept).forEach(e=>items.push({kind:'occ',e}));
 if(cfg.extras)for(const k in EXTRA)for(let i=0;i<EXTRA[k];i++)items.push({kind:'req',type:k,e:def[k].e,rank:def[k].req+i,count:def[k].req+EXTRA[k]});
 if(cfg.junk)JUNK.forEach(e=>items.push({kind:'junk',e}));
 return shuffle(items);
}

function wbSound(type){try{if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);const n=audioCtx.currentTime;if(type==='success'){o.type='sine';o.frequency.setValueAtTime(500,n);o.frequency.exponentialRampToValueAtTime(1000,n+0.1);g.gain.setValueAtTime(0.08,n);g.gain.exponentialRampToValueAtTime(0.01,n+0.3);o.start(n);o.stop(n+0.3);}else if(type==='error'){o.type='sawtooth';o.frequency.setValueAtTime(150,n);o.frequency.linearRampToValueAtTime(100,n+0.2);g.gain.setValueAtTime(0.08,n);g.gain.linearRampToValueAtTime(0.01,n+0.2);o.start(n);o.stop(n+0.2);}else{o.type='triangle';o.frequency.setValueAtTime(800,n);g.gain.setValueAtTime(0.04,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.05);o.start(n);o.stop(n+0.05);}}catch(e){}}
const WTOOLS=[{k:'hammer',e:'🔨'},{k:'wrench',e:'🔧'},{k:'driver',e:'🪛'},{k:'saw',e:'🪚'},{k:'ruler',e:'📏'},{k:'scissors',e:'✂️'},{k:'flashlight',e:'🔦'},{k:'brush',e:'🖌️'}];

const WB={i:0,results:[],timer:null,t0:0,mistakes:0,pending:0,stainsLeft:0,defectFound:false,found:0,layout:[],colored:false};
function wbGrid(i){return {x:(i%4+0.5)/4*100,y:(Math.floor(i/4)===0?28:60)};}
function wbInitLayout(){const sp=wbScatter(8);WB.layout=WTOOLS.map((o,i)=>({k:o.k,e:o.e,x:sp[i].x,y:sp[i].y,rot:rnd(-25,25)}));WB.colored=false;}

function showWbBench(){

 const surf=$('#bsurf');
 WB.layout.forEach(o=>{const s=wbObj(surf,o.e,o.x,o.y,{rot:o.rot,size:30,hue:WB.colored?WHUE[o.k]:null});s.onclick=()=>{
   if(o.k===target.k){clearInterval(WB.timer);WB.timer=null;wbSound('success');WB.results.push({bench:(Date.now()-WB.t0)/1000,mistakes:WB.mistakes});go(showWbResult);}
   else{wbSound('error');WB.mistakes++;const base=WB.colored?`hue-rotate(${WHUE[o.k]}deg) saturate(1.4) `:'';s.style.filter=base+'drop-shadow(0 0 8px red)';setTimeout(()=>s.style.filter=base.trim(),300);}};});
 WB.t0=Date.now();WB.timer=setInterval(()=>{const e=$('#wbbt');if(e)e.textContent=((Date.now()-WB.t0)/1000).toFixed(1);},100);

function showWbResult(){const i=WB.i,p=t('wbPhase')[i],r=WB.results[WB.results.length-1],last=i===4;app.innerHTML=`<div class="card"><h2>${p.t}</h2><p class="muted">${t('wbRetrieval')}</p><div class="bigscore">${r.bench.toFixed(1)} <span style="font-size:18px;color:#5d6a7a">${t('secs')}</span></div><div class="lesson">${p.l}</div><p style="margin-top:16px"><button class="btn" onclick="${last?'go(showWbFinal)':'go(showWbIntro,'+(i+1)+')'}">${t('cont')}</button></p></div>`;}
function showWbFinal(){const maxT=Math.max.apply(null,WB.results.map(r=>r.bench)),names=t('wbDeb');const rows=WB.results.map((r,i)=>`<div class="row"><div class="lbl">${i+1}. ${names[i][0]}</div><div class="track"><div class="fill" style="width:${Math.max(9,r.bench/maxT*100)}%">${r.bench.toFixed(1)}${t('secs')}</div></div></div>`).join('');const deb=names.map(d=>`<tr><td>${d[0]}</td><td>${d[1]}</td><td>${d[2]}</td></tr>`).join('');app.innerHTML=`<div class="card"><h2>${t('results')} — ${t('benchGame')}</h2><div class="bars">${rows}</div><p class="muted">${t('shorterBetter')} ${t('wbChartNote')}</p></div><div class="card"><h2>${t('debrief')}</h2><table class="deb"><tr><th>5S</th><th></th><th></th></tr>${deb}</table><p style="margin-top:14px"><button class="btn" onclick="go(startWorkbench)">${t('playAgain')}</button> <button class="btn sec" onclick="go(showHome)">${t('menu')}</button></p></div>`;}
function wbObj(surf,emoji,x,y,opts){opts=opts||{};const s=document.createElement('span');s.className='obj';s.textContent=emoji;s.style.left=x+'%';s.style.top=y+'%';let tr='translate(-50%,-50%)';if(opts.rot)tr+=` rotate(${opts.rot}deg)`;s.style.transform=tr;let f='';if(opts.gray)f='grayscale(1) opacity(.55)';else if(opts.hue!=null)f=`hue-rotate(${opts.hue}deg) saturate(1.4)`;if(f)s.style.filter=f;if(opts.size)s.style.fontSize=opts.size+'px';surf.appendChild(s);return s;}
function wbScatter(n){const cols=Math.ceil(Math.sqrt(n*1.7)),rows=Math.ceil(n/cols),cells=[];for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)cells.push([c,r]);shuffle(cells);const out=[];for(let k=0;k<n;k++){const c=cells[k][0],r=cells[k][1];out.push({x:cl((c+0.5+rnd(-0.25,0.25))/cols*100,8,92),y:cl((r+0.5+rnd(-0.25,0.25))/rows*100,12,88)});}return out;}

function wbSeiton(surf){
 WTOOLS.forEach((o,i)=>{const g=wbGrid(i);const sl=document.createElement('span');sl.className='slot';sl.textContent=o.e;sl.dataset.tool=o.k;sl.style.left=g.x+'%';sl.style.top=g.y+'%';sl.style.transform='translate(-50%,-50%)';surf.appendChild(sl);});

function wbDraggable(el,surf){
 el.style.cursor='grab';
 const down=ev=>{ev.preventDefault();wbSound('click');
  const move=e=>{const pt=e.touches?e.touches[0]:e,rect=surf.getBoundingClientRect();el.style.left=cl((pt.clientX-rect.left)/rect.width*100,3,97)+'%';el.style.top=cl((pt.clientY-rect.top)/rect.height*100,3,97)+'%';};
  const up=()=>{document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);document.removeEventListener('touchmove',move);document.removeEventListener('touchend',up);
   const slots=surf.querySelectorAll('.slot');let done=false;
   slots.forEach(sl=>{if(done||sl.dataset.tool!==el.dataset.tool||sl.classList.contains('filled'))return;const a=el.getBoundingClientRect(),b=sl.getBoundingClientRect();if(Math.abs((a.left+a.width/2)-(b.left+b.width/2))<48&&Math.abs((a.top+a.height/2)-(b.top+b.height/2))<48){el.style.left=sl.style.left;el.style.top=sl.style.top;sl.classList.add('filled');el.onmousedown=null;el.ontouchstart=null;el.style.cursor='default';wbSound('success');done=true;WB.pending--;if(WB.pending<=0){WB.layout=WTOOLS.map((o,k)=>{const g=wbGrid(k);return {k:o.k,e:o.e,x:g.x,y:g.y,rot:0};});setTimeout(wbAfterPhase,300);}}});
   if(!done)wbSound('error');};
  document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);document.addEventListener('touchmove',move,{passive:false});document.addEventListener('touchend',up);};
